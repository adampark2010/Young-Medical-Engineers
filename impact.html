<script>
/* ══════════════════════════════════════════════════════════════
   EDIT THE NUMBERS BELOW TO UPDATE THIS PAGE.
   Add or remove periods freely — bars redraw automatically.
   total: "sum"  → headline shows all periods added together
   total: "last" → headline shows the most recent period only
   ══════════════════════════════════════════════════════════════ */
window.IMPACT = {
  reached: {
    prefix: "", suffix: "+",
    color: "#c4685f",             /* logo red   */
    total: "sum",
    values: {
      "Fall '25": 0,
      "Winter '26": 0,
      "Spring '26": 0,
      "Summer '26": 0
    }
  },
  raised: {
    prefix: "$", suffix: "",
    color: "#8b92ab",             /* logo steel */
    total: "sum",
    values: {
      "Fall '25": 0,
      "Winter '26": 0,
      "Spring '26": 0,
      "Summer '26": 0
    }
  },
  active: {
    prefix: "", suffix: "",
    color: "#7e93bd",             /* logo navy  */
    total: "last",
    values: {
      "Fall '25": 0,
      "Winter '26": 0,
      "Spring '26": 0,
      "Summer '26": 0
    }
  }
};
</script>
